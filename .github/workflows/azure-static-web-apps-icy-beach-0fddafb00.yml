name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event_name != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_0FDDAFB00: $ {{ secrets.4f6e1537cce88fb407f83e4726b4124c191aebed0e4a896b5e43d5932cdcdd1006-163e3955-d73b-4414-a6df-43346a67b82d00005020fddafb00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### In settings ko dhyan se dekhiye ######
          app_location: "/" 
          api_location: "" 
          output_location: "" 
          skip_app_build: true
          ############################################

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event_name == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_BEACH_0FDDAFB00: $ {{ secrets.4f6e1537cce88fb407f83e4726b4124c191aebed0e4a896b5e43d5932cdcdd1006-163e3955-d73b-4414-a6df-43346a67b82d00005020fddafb00 }}
          action: "close"


